<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSV Data Validator</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">

        <!-- Card -->
        <div class="card shadow-lg border-0 rounded-3">
          <div class="card-body p-4">
            <h3 class="text-center mb-3">📊 CSV Data Validator</h3>
            <p class="text-muted text-center">Upload your CSV file and get a validation report in Excel</p>

            <!-- Upload Form -->
            <form action="/upload" method="post" enctype="multipart/form-data">
              <div class="mb-3">
                <label for="file" class="form-label">Choose CSV File</label>
                <input type="file" class="form-control" id="file" name="file" accept=".csv" required>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-primary">Upload & Validate</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Info -->
        <div class="alert alert-info mt-4 text-center">
          Supported Format: <strong>CSV</strong><br>
          Report will be generated in <strong>Excel (.xlsx)</strong>
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
